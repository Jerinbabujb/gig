<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #003366;
    --gold:   #C5A086;
    --gold-lt:#C5A086;
    --cream:  #F4F4F4;
    --smoke:  #F4F4F4;
    --text:   #2C2C2C;
    --muted:  #7A7369;
  }
@font-face {
  font-family: 'ReformaBlanca';
  src: url('Reforma.1918-Blanca.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

/* Apply globally */
body {
  font-family: 'ReformaBlanca', sans-serif;
}
  body {
    min-height: 100vh;
    /* background: var(--navy); */
    background-color: #e6e6e6;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-image:
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(201,168,76,.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(201,168,76,.07) 0%, transparent 60%);
  }

  /* ── CARD ─────────────────────────────────── */
  .card {
    width: 420px;
    background: var(--cream);
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 40px 80px rgba(0,0,0,.45),
      0 0 0 1px rgba(201,168,76,.25);
    animation: rise .9s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes rise {
    from { opacity:0; transform: translateY(40px) scale(.97); }
    to   { opacity:1; transform: translateY(0)   scale(1);    }
  }

  /* ── HEADER BAND ───────────────────────────── */
  .card-header {
    background: var(--navy);
    position: relative;
    padding: 36px 32px 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    overflow: hidden;
  }
  .card-header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='rgba(201,168,76,.06)' stroke-width='1'%3E%3Cpath d='M30 0 L60 30 L30 60 L0 30 Z'/%3E%3C/g%3E%3C/svg%3E") repeat;
    pointer-events: none;
  }

  /* ── LOGO ──────────────────────────────────── */
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 1;
    animation: rise .7s .1s cubic-bezier(.22,1,.36,1) both;
  }
  .logo-mark {
    width: 36px; height: 36px;
    position: relative;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 100%; height: 100%; }
  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .logo-name {
    font-family: 'ReformaBlanca', sans-serif;
    font-weight: 600;
    font-size: 1.25rem;
    color: var(--cream);
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .logo-tagline {
    font-size: .6rem;
    color: var(--gold);
    letter-spacing: .18em;
    text-transform: uppercase;
    margin-top: 3px;
    font-weight: 300;
  }

  /* ── GOLD RULE ─────────────────────────────── */
  .gold-rule {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
    margin-top: 24px;
    z-index: 1;
  }

  /* ── PHOTO + NAME BLOCK ────────────────────── */
  .profile-row {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    padding: 0 32px;
    margin-top: -1px;
    background: var(--navy);
    position: relative;
    z-index: 1;
    padding-bottom: 28px;
    animation: rise .7s .2s cubic-bezier(.22,1,.36,1) both;
  }
  .avatar-wrap {
    flex-shrink: 0;
    margin-top: 24px;
  }
  .avatar {
    width: 90px;height:90px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    object-fit: contain;
    display: block;
    background: linear-gradient(135deg, #1e3a5f 0%, #0D1B2A 100%);
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 5px rgba(201,168,76,.15);
  }
  /* SVG placeholder person */
  .avatar img {
    width: 100%; height: 100%;
  }
  .name-block { flex: 1; padding-bottom: 4px; }
  .emp-name {
    font-family: 'ReformaBlanca', sans-serif;
    font-weight: 300;
    font-size: 1.65rem;
    color: var(--cream);
    line-height: 1.15;
    letter-spacing: .01em;
  }
  .emp-title {
    font-size: .72rem;
    color: var(--gold);
    letter-spacing: .2em;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 300;
  }
  .emp-dept {
    font-size: .7rem;
    color: rgba(245,240,232,.45);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-top: 2px;
    font-weight: 300;
  }

  /* ── CURVED TRANSITION ─────────────────────── */
  .wave {
    background: var(--navy);
    height: 32px;
    position: relative;
    margin-bottom: -1px;
  }
  .wave::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 32px;
    background: var(--cream);
    border-radius: 28px 28px 0 0;
  }

  /* ── BODY ──────────────────────────────────── */
  .card-body {
    background: var(--cream);
    padding: 32px 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    animation: rise .7s .3s cubic-bezier(.22,1,.36,1) both;
  }

  /* ── CONTACT LIST ──────────────────────────── */
  .contact-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform .2s;
  }
  .contact-item:hover { transform: translateX(3px); }
  .ci-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(13,27,42,.15);
  }
  .ci-icon svg { width: 16px; height: 16px; fill: var(--gold); }
  .ci-label {
    font-size: .62rem;
    color: var(--muted);
    letter-spacing: .12em;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 1px;
  }
  .ci-value {
    font-size: .85rem;
    color: var(--text);
    font-weight: 400;
    text-decoration: none;
    transition: color .2s;
  }
  .ci-value:hover { color: #C9A84C; }

  /* ── DIVIDER ───────────────────────────────── */
  .divider {
    height: 1px;
    background: var(--smoke);
    border: none;
    margin: 0 -4px;
  }

  /* ── ADDRESS ───────────────────────────────── */
  .address-block {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .addr-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(13,27,42,.15);
  }
  .addr-icon svg { width: 16px; height: 16px; fill: var(--gold); }
  .addr-text {
    font-size: .84rem;
    color: var(--text);
    line-height: 1.6;
    font-weight: 300;
    padding-top: 2px;
  }
  .addr-text strong { font-weight: 500; display: block; margin-bottom: 1px; }

  /* ── SOCIAL ROW ────────────────────────────── */
  .social-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding-top: 4px;
  }
  .soc-btn {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    transition: transform .2s, box-shadow .2s, background .2s;
    box-shadow: 0 2px 8px rgba(13,27,42,.12);
  }
  .soc-btn svg { width: 18px; height: 18px; fill: var(--gold); }
  .soc-btn:hover {
    transform: translateY(-3px);
    background: #162338;
    box-shadow: 0 8px 20px rgba(13,27,42,.25);
  }

  /* ── FOOTER ────────────────────────────────── */
  .card-footer {
    background: var(--navy);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-txt {
    font-size: .6rem;
    color: rgba(245,240,232,.3);
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .save-btn {
    font-family: 'ReformaBlanca', sans-serif;
    font-size: .65rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--navy);
    background: var(--gold);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
    font-weight: 500;
    transition: background .2s, transform .15s;
  }
  .save-btn:hover { background: var(--gold-lt); transform: scale(1.03); }
</style>
</head>
